<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StockPing - Sidebar Mock</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Google Sans', sans-serif; font-size: 13px; color: #202124; background: #e8eaed; display: flex; justify-content: center; padding: 40px 20px; }
    .device-frame { background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,.2); width: 300px; overflow: hidden; }
    .device-titlebar { background: #0f9d58; color: #fff; padding: 12px 16px; font-size: 14px; font-weight: 700; }
    .sidebar-body { padding: 10px; background: #f8f9fa; }
    .tabs { display: flex; border-bottom: 2px solid #e8eaed; margin-bottom: 12px; }
    .tab { padding: 8px 10px; font-size: 11px; font-weight: 500; color: #5f6368; border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .tab.active { color: #0f9d58; border-bottom-color: #0f9d58; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 2px rgba(60,64,67,.12); padding: 10px 12px; margin-bottom: 8px; }
    .stock-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .stock-table th { background: #f1f3f4; color: #5f6368; font-size: 10px; font-weight: 600; padding: 4px 6px; text-align: left; }
    .stock-table td { padding: 5px 6px; border-bottom: 1px solid #f1f3f4; }
    .row-red { background: #fce8e6; } .row-yellow { background: #fef9e7; } .row-green { background: #e6f4ea; }
    .btn-primary { width: 100%; padding: 8px; background: #0f9d58; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    .btn-secondary { width: 100%; padding: 7px; background: #fff; color: #0f9d58; border: 1px solid #dadce0; border-radius: 6px; font-size: 12px; cursor: pointer; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="device-frame">
    <div class="device-titlebar">&#128230; StockPing</div>
    <div class="sidebar-body">
      <div class="tabs">
        <div class="tab active">Dashboard</div>
        <div class="tab">Columns</div>
        <div class="tab">Settings</div>
      </div>
      <div class="card">
        <table class="stock-table">
          <tr><th></th><th>Item</th><th>Current</th><th>Min</th></tr>
          <tr class="row-red"><td>&#9679;</td><td>Widget A</td><td>0</td><td>20</td></tr>
          <tr class="row-yellow"><td>&#9679;</td><td>Component B</td><td>7</td><td>15</td></tr>
          <tr class="row-green"><td>&#9679;</td><td>Part C</td><td>45</td><td>10</td></tr>
        </table>
      </div>
      <button class="btn-primary">Check Stock Now</button>
      <button class="btn-secondary">Update Color Codes</button>
    </div>
  </div>
</body>
</html>
